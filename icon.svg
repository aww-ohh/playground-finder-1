<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sky-blue background -->
  <rect width="512" height="512" rx="96" fill="#a3d8ed"/>

  <!-- Sun -->
  <circle cx="418" cy="118" r="52" fill="#ffd24c" stroke="#1a1410" stroke-width="6"/>

  <!-- Cloud -->
  <ellipse cx="108" cy="138" rx="58" ry="24" fill="#fff" stroke="#1a1410" stroke-width="5"/>

  <!-- Emerald grass mound at the bottom -->
  <ellipse cx="256" cy="502" rx="248" ry="66" fill="#0d9b62"/>

  <!-- The slide is the whole mark now (no lettering) — enlarged and centered
       so it stands on the grass and fills the scene. -->
  <text x="256" y="470" font-size="300" text-anchor="middle">🛝</text>
</svg>
