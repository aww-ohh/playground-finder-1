<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground &amp; Park Finder</title>

  <!-- Google Fonts: Fredoka for the title, Nunito for body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS (for the map, used later) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1 class="title">Playground &amp; Park Finder</h1>
    <p class="byline">by AWW</p>
    <p class="tagline">Find playgrounds and parks near you — perfect for little explorers.</p>
  </header>

  <main>
    <section class="search-section">
      <button id="geolocate-btn" class="btn-locate">Use My Location</button>
      <div class="divider-text">or</div>
      <form id="address-form" class="address-form">
        <input
          type="text"
          id="address-input"
          class="address-input"
          placeholder="Enter an address, city, or zip code"
          autocomplete="street-address"
        />
        <button type="submit" class="btn-search">Search</button>
      </form>
    </section>

    <!-- Wrapper for side-by-side layout on desktop -->
    <div class="map-results-wrapper">
      <!-- Map container: hidden until we have a location -->
      <section id="map-section" class="map-section hidden">
        <div id="map"></div>
      </section>

      <!-- Results list: hidden until we have results -->
      <section id="results-section" class="results-section hidden">
        <div class="results-toolbar">
          <h2 class="results-heading">Nearby Playgrounds &amp; Parks</h2>
          <div class="filter-row">
            <div class="type-filter" id="type-filter">
              <button class="type-btn active" data-type="all">All</button>
              <button class="type-btn" data-type="playground">Playgrounds</button>
              <button class="type-btn" data-type="park">Parks</button>
            </div>
          </div>
          <div class="filter-row">
            <div class="sort-control">
              <label for="radius-select" class="sort-label">Radius</label>
              <select id="radius-select" class="sort-select">
                <option value="0.5">&frac12; mile</option>
                <option value="1">1 mile</option>
                <option value="2" selected>2 miles</option>
                <option value="5">5 miles</option>
              </select>
            </div>
            <div class="sort-control">
              <label for="sort-select" class="sort-label">Sort by</label>
              <select id="sort-select" class="sort-select">
                <option value="distance">Closest first</option>
                <option value="rating">Highest rated</option>
                <option value="reviews">Most reviewed</option>
              </select>
            </div>
          </div>
        </div>
        <ul id="results-list" class="results-list"></ul>
      </section>
    </div>
  </main>

  <!-- Leaflet JS (for the map, used later) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Our JavaScript (will be built in Step 3) -->
  <script src="app.js"></script>
</body>
</html>
